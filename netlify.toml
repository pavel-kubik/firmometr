[build]
  command = "npm ci && npm run build"
  publish = "dist/lustrare-ui/browser"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command = "npm start"
  targetPort = 4201
  port = 8889
  autoLaunch = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
